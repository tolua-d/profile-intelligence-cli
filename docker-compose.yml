
services:
  cli:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: insighta_cli
    environment:
      INSIGHTA_API_URL: ${INSIGHTA_API_URL:-http://api:8000}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
    volumes:
      - ~/.insighta:/root/.insighta
      - ./:/app
    networks:
      - default
    stdin_open: true
    tty: true

  # Include API reference - can be overridden
